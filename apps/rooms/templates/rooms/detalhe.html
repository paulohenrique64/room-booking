{% extends 'base.html' %}
{% block title %}{{ sala.nome }}{% endblock %}
{% block content %}
<h1 class="h3">{{ sala.nome }}</h1>
<p class="text-muted">{{ sala.predio }} — Andar {{ sala.andar }} · {{ sala.capacidade }} pessoas</p>
<form class="row g-2 mb-3" hx-get="{% url 'rooms:detalhe' sala.pk %}" hx-target="#disponibilidade" hx-swap="innerHTML">
  <div class="col-auto"><input type="date" name="data" class="form-control" value="{{ request.GET.data }}" required></div>
  <div class="col-auto"><button class="btn btn-primary" type="submit">Consultar</button></div>
</form>
<div id="disponibilidade">{% include 'rooms/partials/_disponibilidade.html' %}</div>
{% endblock %}
