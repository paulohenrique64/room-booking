services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-agendamento_salas}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootadmin}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - room-booking-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      start_period: 20s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    command:
      - sh
      - -c
      - >
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        exec gunicorn --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-4} --timeout $${GUNICORN_TIMEOUT:-60} config.wsgi:application
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    networks:
      - room-booking-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2)\""]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 6

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - room-booking-network

volumes:
  db_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  room-booking-network:
    driver: bridge
